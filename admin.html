<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咨询管理 - 学科辅导网</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin: 20px 0 30px; color: #1a1a2e; }
    .login-box { max-width: 360px; margin: 80px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .login-box h2 { margin-bottom: 24px; color: #333; }
    .login-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 16px; }
    .login-box button { width: 100%; padding: 12px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; }
    .login-box button:hover { background: #4338CA; }
    .login-box .error { color: #EF4444; margin-top: 12px; font-size: 13px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 4px solid #4F46E5; }
    .card .meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #666; margin-bottom: 8px; }
    .card .meta span { background: #f0f0f0; padding: 2px 10px; border-radius: 20px; }
    .card .contact { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
    .card .note { font-size: 14px; color: #444; margin-top: 8px; padding: 8px 12px; background: #f9f9f9; border-radius: 6px; }
    .card .time { font-size: 11px; color: #999; }
    .empty { text-align: center; padding: 60px; color: #999; }
    .count { text-align: right; color: #666; margin-bottom: 16px; font-size: 14px; }
    .refresh-btn { display: inline-block; padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
    .refresh-btn:hover { background: #f5f5f5; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginView" class="login-box">
      <h2>🔐 管理员登录</h2>
      <input type="password" id="pwdInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()">进入</button>
      <div class="error" id="loginError"></div>
    </div>

    <div id="mainView" style="display:none">
      <h1>📋 家长咨询记录</h1>
      <div class="header-row">
        <button class="refresh-btn" onclick="loadSubmissions()">🔄 刷新</button>
        <div class="count" id="countText"></div>
      </div>
      <div id="list"></div>
    </div>
  </div>

  <script>
    var PASSWORD = 'xueke2024';

    function login() {
      var pwd = document.getElementById('pwdInput').value;
      if (pwd === PASSWORD) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('loginError').textContent = '';
        loadSubmissions();
      } else {
        document.getElementById('loginError').textContent = '密码错误';
      }
    }

    async function loadSubmissions() {
      var list = document.getElementById('list');
      list.innerHTML = '<div class="empty">加载中...</div>';

      try {
        var res = await fetch('/api/contact?key=' + PASSWORD);
        var data = await res.json();
        if (!data.success || !data.submissions || data.submissions.length === 0) {
          list.innerHTML = '<div class="empty">暂无咨询记录。有人提交表单后会自动出现在这里。</div>';
          document.getElementById('countText').textContent = '';
          return;
        }
        var subs = data.submissions.reverse();
        document.getElementById('countText').textContent = '共 ' + subs.length + ' 条记录';
        list.innerHTML = subs.map(function(s) {
          return '<div class="card">' +
            '<div class="time">' + new Date(s.timestamp).toLocaleString('zh-CN') + '</div>' +
            '<div class="contact">' + escapeHtml(s.contact || '未填写') + '</div>' +
            '<div class="meta">' +
              '<span>📚 ' + escapeHtml(s.grade || '?') + '</span>' +
              '<span>📖 ' + escapeHtml(s.subject || '?') + '</span>' +
              '<span>📍 ' + escapeHtml(s.city || '?') + '</span>' +
            '</div>' +
            (s.note ? '<div class="note">💬 ' + escapeHtml(s.note) + '</div>' : '') +
          '</div>';
        }).join('');
      } catch (err) {
        list.innerHTML = '<div class="empty">加载失败：' + err.message + '</div>';
      }
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
