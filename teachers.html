<script>

function renderTeacherCards(list) {
  const grid = document.getElementById('teachers-list-grid');
  document.getElementById('result-count').textContent = list.length;
  if (list.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#94A3B8;font-size:16px;">暂无匹配老师，请加微信 <strong style="color:#4F46E5;">fanlaoshiwx</strong> 由顾问为您定制匹配</div>';
    return;
  }
  grid.innerHTML = list.map(t => `
    <div class="teacher-card">
      <div class="tc-avatar">${t.emoji}</div>
      <div class="tc-name">${t.name} <small style="font-weight:400;color:#94A3B8;">${t.gender} · ${t.area}</small></div>
      <span class="tc-edu">${t.edu} · ${t.years}年教龄</span>
      <div class="tc-subjects">📚 ${t.subjects}</div>
      <div style="font-size:12px;color:#94A3B8;margin-bottom:8px;">🎓 ${t.grades}</div>
      <div class="tc-tags">${t.tags.map(tag=>`<span class="tc-tag">${tag}</span>`).join('')}</div>
      <div class="tc-price">💰 ${t.price}</div>
      <a href="index.html#contact" class="tc-cta">加微信咨询</a>
    </div>
  `).join('');
}

function filterTeachers() {
  const subject = document.getElementById('f_subject').value;
  const grade = document.getElementById('f_grade').value;
  const edu = document.getElementById('f_edu').value;
  const city = document.getElementById('f_city').value.trim();
  const search = document.getElementById('f_search').value.trim().toLowerCase();
  let result = allTeachers.filter(t => {
    if (subject && !t.subjects.includes(subject)) return false;
    if (grade && !t.grades.includes(grade)) return false;
    if (edu) {
      if (edu === '985/211' && !t.edu.match(/985|211/)) return false;
      if (edu === '博士/硕士' && !t.edu.match(/博士|硕士/)) return false;
      if (edu === '师范院校' && !t.edu.match(/师范/)) return false;
    }
    if (city && !t.area.includes(city)) return false;
    if (search) {
      const haystack = (t.name + ' ' + t.subjects + ' ' + t.tags.join(' ') + ' ' + t.grades + ' ' + t.area + ' ' + t.edu).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  renderTeacherCards(result);
}

function resetFilter() {
  document.getElementById('f_subject').value = '';
  document.getElementById('f_grade').value = '';
  document.getElementById('f_edu').value = '';
  document.getElementById('f_city').value = '';
  renderTeacherCards(allTeachers);
}

// URL参数自动筛选
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  if (params.get('subject')) document.getElementById('f_subject').value = params.get('subject');
  if (params.get('grade')) document.getElementById('f_grade').value = params.get('grade');
  filterTeachers();

  // 微信复制按钮初始化
  initWechatCopy();
});
</script>
