<!DOCTYPE html>

<head>

  <meta name="keywords" content="找家教老师,一对一辅导老师,数学家教,英语家教,物理家教,家教老师推荐">
  <meta name="description" content="学科辅导网老师库，2000+精选家教老师，按科目、年级、城市筛选，加微信免费咨询匹配。">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-bar {
      background: #fff; padding: 24px 0;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 60px; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .filter-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-row select, .filter-row input {
      padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; color: var(--text-dark); background: var(--bg);
      min-width: 130px; cursor: pointer; font-family: inherit;
    }
    .filter-row select:focus, .filter-row input:focus {
      outline: none; border-color: var(--primary);
    }
    .filter-row .btn-filter {
      background: var(--primary); color: #fff;
      padding: 9px 22px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .filter-row .btn-reset {
      background: none; color: var(--text-mid);
      padding: 9px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .teachers-page-header {
      background: linear-gradient(135deg, #1E1B4B, #4F46E5);
      padding: 100px 0 40px; text-align: center; color: #fff;
    }
    .teachers-page-header h1 { font-size: 34px; font-weight: 800; margin-bottom: 8px; }
    .teachers-page-header p { opacity: 0.8; font-size: 16px; }
    .teachers-main { padding: 40px 0; }
    .result-info { font-size: 14px; color: var(--text-mid); margin-bottom: 20px; }
    .result-info span { color: var(--primary); font-weight: 700; }
    #teachers-list-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .consult-cta {
      background: linear-gradient(135deg, var(--primary), #818CF8);
      color: #fff; border-radius: var(--radius); padding: 40px;
      text-align: center; margin-top: 48px;
    }
    .consult-cta h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .consult-cta p { opacity: 0.85; margin-bottom: 20px; }
    .consult-cta .wechat-highlight {
      font-size: 22px; font-weight: 800; color: #4ADE80;
      background: rgba(255,255,255,0.15); padding: 10px 28px; border-radius: 10px;
      display: inline-block; letter-spacing: 2px; margin-bottom: 12px;
    }
    @media (max-width: 768px) {
      #teachers-list-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-row { gap: 8px; }
    }
    @media (max-width: 480px) {
      #teachers-list-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">📖 <span>学科辅导网</span></a>
    <div class="nav-links">
      <a href="index.html">首页</a>

  </div>
</nav>

<div class="teachers-page-header">
  <div class="container">
    <h1>🔍 找家教老师</h1>
    <p>2000+ 精选老师，按科目 / 年级 / 城市 精准筛选</p>
  </div>
</div>

<div class="filter-bar">
  <div class="container">
    <div class="filter-row">
      <select id="f_subject">
        <option value="">全部科目</option>
        <option>语文</option><option>数学</option><option>英语</option>
        <option>物理</option><option>化学</option><option>生物</option>
        <option>历史</option><option>地理</option><option>政治</option>
        <option>奥数/竞赛</option><option>编程/信息</option>
      </select>
      <select id="f_grade">
        <option value="">全部年级</option>
        <option>小学</option><option>初中</option><option>高中</option><option>高考冲刺</option><option>中考冲刺</option>
      </select>
      <select id="f_edu">
        <option value="">全部学历</option>
        <option>985/211</option><option>博士/硕士</option><option>师范院校</option>
      </select>
      <input type="text" id="f_city" placeholder="输入城市，如：北京">
      <button class="btn-filter" onclick="filterTeachers()">筛选</button>
      <button class="btn-reset" onclick="resetFilter()">重置</button>
    </div>
  </div>
</div>

<div class="teachers-main">
  <div class="container">
    <div class="result-info">共找到 <span id="result-count">0</span> 位老师</div>
    <div id="teachers-list-grid"></div>
    <div class="consult-cta">
      <h3>👨‍🏫 没找到合适的老师？</h3>
      <p>告诉我们您的需求，我们从后台为您精准匹配，48小时内回复</p>
      <div class="wechat-highlight">fanlaoshiwx</div>
      <p style="opacity:0.7;font-size:13px;">加微信备注「学科+年级+城市」，顾问免费为您匹配</p>
      <a href="index.html#contact" style="display:inline-block;margin-top:16px;background:#fff;color:var(--primary);padding:12px 30px;border-radius:24px;font-weight:700;font-size:15px;">填写匹配表单 →</a>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-logo">📖 学科辅导网</div>
        <p>全国精品家教匹配平台</p>
        <div class="footer-wechat">微信咨询：<strong>fanlaoshiwx</strong></div>
      </div>
      <div class="footer-links">
        <h4>快速导航</h4>
        <a href="index.html">首页</a><a href="teachers.html">找老师</a>
        <a href="subjects.html">学科大全</a><a href="about.html">关于我们</a>
      </div>
      <div class="footer-links">
        <h4>热门科目</h4>
        <a href="teachers.html?subject=数学">数学辅导</a>
        <a href="teachers.html?subject=英语">英语辅导</a>
        <a href="teachers.html?subject=物理">物理辅导</a>
        <a href="teachers.html?subject=奥数">奥数竞赛</a>
      </div>
    </div>
    <div class="footer-bottom"><p>© 2024-2026 学科辅导网 版权所有</p></div>
  </div>
</footer>

<div id="float-btn" onclick="location.href='index.html#contact'">
  <span class="float-icon">💬</span>
  <span class="float-text">免费匹配</span>
</div>

<script>
const allTeachers = [
  { name:"王晓明", gender:"男", edu:"985硕士", area:"北京", subjects:"数学·物理", grades:"高中·高考", years:8, tags:["竞赛专项","高考冲刺","耐心细致"], price:"200-280元/时", emoji:"王" },
  { name:"李思雨", gender:"女", edu:"211本科", area:"上海", subjects:"英语·语文", grades:"初中·高中", years:5, tags:["口语流利","写作提升","亲和力强"], price:"180-250元/时", emoji:"李" },
  { name:"陈建国", gender:"男", edu:"名校博士", area:"广州", subjects:"化学·生物", grades:"高中·竞赛", years:10, tags:["竞赛教练","实验讲解","逻辑清晰"], price:"260-350元/时", emoji:"陈" },
  { name:"张美丽", gender:"女", edu:"师范本科", area:"成都", subjects:"语文·数学", grades:"小学", years:6, tags:["启蒙专家","趣味教学","家长好评"], price:"120-180元/时", emoji:"张" },
  { name:"刘志强", gender:"男", edu:"985本科", area:"南京", subjects:"数学·信息", grades:"初中·高中", years:7, tags:["奥数金牌","编程竞赛","逻辑思维"], price:"220-300元/时", emoji:"刘" },
  { name:"赵雅婷", gender:"女", edu:"211硕士", area:"杭州", subjects:"英语·历史", grades:"初中·高中", years:4, tags:["托福满分","双语教学","外向活泼"], price:"200-280元/时", emoji:"赵" },
  { name:"孙浩然", gender:"男", edu:"重点本科", area:"武汉", subjects:"物理·化学", grades:"高中·中考", years:9, tags:["理综专家","题型总结","提分快"], price:"180-240元/时", emoji:"孙" },
  { name:"周晨曦", gender:"女", edu:"师范硕士", area:"西安", subjects:"语文·政治", grades:"高中·中考", years:6, tags:["答题技巧","作文满分","文科全能"], price:"160-220元/时", emoji:"周" },
  { name:"吴佳慧", gender:"女", edu:"985本科", area:"北京", subjects:"数学·英语", grades:"小学·初中", years:3, tags:["英美外教背景","趣味教学","提分显著"], price:"220-300元/时", emoji:"吴" },
  { name:"郑文博", gender:"男", edu:"211博士", area:"上海", subjects:"物理·数学", grades:"高中·竞赛", years:11, tags:["物理竞赛银牌","高考满分","严格要求"], price:"280-400元/时", emoji:"郑" },
  { name:"冯雪莹", gender:"女", edu:"师范本科", area:"深圳", subjects:"英语·语文", grades:"小学·初中", years:5, tags:["口语纯正","阅读提升","轻松愉快"], price:"180-250元/时", emoji:"冯" },
  { name:"何俊杰", gender:"男", edu:"985本科", area:"重庆", subjects:"数学·物理", grades:"初中·高中", years:6, tags:["中考状元","思路清晰","善于总结"], price:"160-220元/时", emoji:"何" },
];

function renderTeacherCards(list) {
  const grid = document.getElementById('teachers-list-grid');
  document.getElementById('result-count').textContent = list.length;
  if (list.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#94A3B8;font-size:16px;">暂无匹配老师，请加微信 <strong style="color:#4F46E5;">fanlaoshiwx</strong> 由顾问为您定制匹配</div>';
    return;
  }
  grid.innerHTML = list.map(t => `
    <div class="teacher-card">
      <div class="tc-avatar">${t.emoji}</div>
      <div class="tc-name">${t.name} <small style="font-weight:400;color:#94A3B8;">${t.gender} · ${t.area}</small></div>
      <span class="tc-edu">${t.edu} · ${t.years}年教龄</span>
      <div class="tc-subjects">📚 ${t.subjects}</div>
      <div style="font-size:12px;color:#94A3B8;margin-bottom:8px;">🎓 ${t.grades}</div>
      <div class="tc-tags">${t.tags.map(tag=>`<span class="tc-tag">${tag}</span>`).join('')}</div>
      <div class="tc-price">💰 ${t.price}</div>
      <a href="index.html#contact" class="tc-cta">加微信咨询</a>
    </div>
  `).join('');
}

function filterTeachers() {
  const subject = document.getElementById('f_subject').value;
  const grade = document.getElementById('f_grade').value;
  const edu = document.getElementById('f_edu').value;
  const city = document.getElementById('f_city').value.trim();
  let result = allTeachers.filter(t => {
    if (subject && !t.subjects.includes(subject)) return false;
    if (grade && !t.grades.includes(grade)) return false;
    if (edu) {
      if (edu === '985/211' && !t.edu.match(/985|211/)) return false;
      if (edu === '博士/硕士' && !t.edu.match(/博士|硕士/)) return false;
      if (edu === '师范院校' && !t.edu.match(/师范/)) return false;
    }
    if (city && !t.area.includes(city)) return false;
    return true;
  });
  renderTeacherCards(result);
}

function resetFilter() {
  document.getElementById('f_subject').value = '';
  document.getElementById('f_grade').value = '';
  document.getElementById('f_edu').value = '';
  document.getElementById('f_city').value = '';
  renderTeacherCards(allTeachers);
}

// URL参数自动筛选
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  if (params.get('subject')) document.getElementById('f_subject').value = params.get('subject');
  if (params.get('grade')) document.getElementById('f_grade').value = params.get('grade');
  filterTeachers();

  // 导航
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.querySelector('.nav-links');
  if (hamburger && navLinks) {
    hamburger.addEventListener('click', () => {
      const show = navLinks.style.display !== 'flex';
      Object.assign(navLinks.style, show ? {
        display: 'flex', flexDirection: 'column',
        position: 'absolute', top: '60px', left: '0', right: '0',
        background: '#fff', padding: '16px 20px',
        borderBottom: '1px solid #E2E8F0', gap: '14px', zIndex: '999'
      } : { display: 'none' });
    });
  }
});
</script>
</body>
</html>
